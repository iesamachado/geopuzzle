version: '3.8'

services:
  frontend:
    # Reemplaza 'bernat13' con tu usuario real de Docker Hub si es distinto
    image: bernat13/maps3d-frontend:latest
    ports:
      # En producción mapeamos directo al puerto 80 web estándar en vez del 8000
      - "80:80"
    depends_on:
      - backend
    restart: always

  backend:
    image: bernat13/maps3d-backend:latest
    ports:
      # El frontend busca el puerto 3000 localmente en el navegador
      - "3000:3000"
    environment:
      # Se mantiene el aumento de memoria vital para las exportaciones STL grandes
      - NODE_OPTIONS=--max_old_space_size=8192
      - PORT=3000
    volumes:
      - ./backend/jobs:/app/jobs
    restart: always
